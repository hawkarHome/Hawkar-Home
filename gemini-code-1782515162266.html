<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hawkar Home | دیزاین و کەوانتەری لوکس</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-white shadow-md p-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-gray-800">Hawkar Home</h1>
        <ul class="flex gap-6 text-gray-600">
            <li>سەرەکی</li>
            <li>بەرهەمەکان</li>
            <li>ژمێرەری نرخ</li>
        </ul>
    </nav>

    <header class="text-center py-20 bg-gray-900 text-white">
        <h2 class="text-4xl font-bold">باشترین دیزاینی ماڵەکەت لە Hawkar Home</h2>
        <p class="mt-4 text-gray-400">کوالێتی بەرز و دیزاینی سەردەمیانە</p>
    </header>

    <section class="max-w-6xl mx-auto py-10 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white p-6 rounded-lg shadow-lg">
            <h3 class="text-xl font-semibold">کەوانتەر</h3>
            <p class="text-gray-500">دیزاینی تایبەت بە مەتەبخی ئێوە</p>
            <button class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">بینینی نرخ</button>
        </div>
        </section>

</body>
</html>
